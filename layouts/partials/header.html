<header id="site-header" class="fixed top-0 left-0 right-0 z-50 bg-brand-green shadow-md">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex items-center justify-between h-16 md:h-20">

      <!-- Logo -->
      <a href="/" class="flex-shrink-0">
        <img src="/images/logo-white.png" alt="LLITC - Lloyd's IT Consulting" class="h-9 md:h-11">
      </a>

      <!-- Desktop Nav -->
      <nav class="hidden md:flex items-center gap-8">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="font-chakra text-white/75 hover:text-white text-xs uppercase tracking-[0.2em] transition-colors duration-200">{{ .Name }}</a>
        {{ end }}
        <a href="#contact" class="font-chakra bg-white text-brand-green text-xs font-semibold px-5 py-2.5 uppercase tracking-[0.15em] hover:bg-emerald-50 transition-colors duration-200 ml-2">
          Get in Touch
        </a>
      </nav>

      <!-- Mobile Menu Button -->
      <button id="menu-toggle" class="md:hidden text-white p-2 -mr-2" aria-label="Toggle menu">
        <svg id="menu-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg id="close-icon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden pb-5 border-t border-white/20">
      <nav class="flex flex-col gap-4 pt-5">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="font-chakra text-white/75 hover:text-white text-xs uppercase tracking-[0.2em] transition-colors">{{ .Name }}</a>
        {{ end }}
        <a href="#contact" class="font-chakra bg-white text-brand-green text-xs font-semibold px-5 py-3 text-center uppercase tracking-[0.15em] hover:bg-emerald-50 transition-colors mt-2">
          Get in Touch
        </a>
      </nav>
    </div>
  </div>

  <script>
    (function() {
      var toggle = document.getElementById('menu-toggle');
      var menu = document.getElementById('mobile-menu');
      var menuIcon = document.getElementById('menu-icon');
      var closeIcon = document.getElementById('close-icon');
      toggle.addEventListener('click', function() {
        menu.classList.toggle('hidden');
        menuIcon.classList.toggle('hidden');
        closeIcon.classList.toggle('hidden');
      });
      document.querySelectorAll('#mobile-menu a').forEach(function(link) {
        link.addEventListener('click', function() {
          menu.classList.add('hidden');
          menuIcon.classList.remove('hidden');
          closeIcon.classList.add('hidden');
        });
      });
    })();
  </script>
</header>
